<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>XML → JSON Converter</title>

<style>
  :root {
    --bg: #f0f2f5;
    --bg-gradient: linear-gradient(135deg, #f0f2f5 0%, #e6e9f0 100%);
    --card-bg: #ffffff;
    --text: #1a1a2e;
    --text-muted: #666;
    --hint: #999;
    --border: #e5e7eb;
    --border-strong: #ddd;
    --primary: #2563eb;
    --primary-hover: #1d4ed8;
    --danger: #dc2626;
    --success: #059669;
    --success-hover: #047857;
    --gutter-bg: #f6f8fa;
    --gutter-text: #8b949e;
    --gutter-border: #d0d7de;
    --switch-off: #cbd5e1;
    --shadow: 0 4px 20px rgba(0,0,0,0.06);
    --shadow-hover: 0 6px 24px rgba(0,0,0,0.10);

    --json-key: #b45309;
    --json-string: #059669;
    --json-number: #db2777;
    --json-boolean: #7c3aed;
    --json-null: #dc2626;
    --error-bg: rgba(220, 38, 38, 0.08);
  }
  [data-theme="dark"] {
    --bg: #0f172a;
    --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
    --card-bg: #1e293b;
    --text: #f1f5f9;
    --text-muted: #cbd5e1;
    --hint: #94a3b8;
    --border: #334155;
    --border-strong: #475569;
    --primary: #3b82f6;
    --primary-hover: #60a5fa;
    --danger: #f87171;
    --success: #10b981;
    --success-hover: #059669;
    --gutter-bg: #161f31;
    --gutter-text: #6e7681;
    --gutter-border: #30363d;
    --switch-off: #475569;
    --shadow: 0 4px 20px rgba(0,0,0,0.4);
    --shadow-hover: 0 6px 24px rgba(0,0,0,0.5);

    --json-key: #fbbf24;
    --json-string: #4ade80;
    --json-number: #f472b6;
    --json-boolean: #c084fc;
    --json-null: #f87171;
    --error-bg: rgba(248, 113, 113, 0.12);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Segoe UI', Tahoma, sans-serif;
    background: var(--bg-gradient);
    padding: 20px;
    color: var(--text);
    transition: background 0.3s, color 0.3s;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }
  .container {
    max-width: 1700px;
    margin: 0 auto;
    width: 100%;
    flex: 1 1 auto;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  h1 {
    text-align: center;
    margin-bottom: 4px;
    font-size: 1.6rem;
    font-weight: 700;
    background: linear-gradient(90deg, var(--primary), var(--danger));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    flex-shrink: 0;
  }
  .subtitle { text-align: center; color: var(--text-muted); margin-bottom: 12px; font-size: 0.85rem; flex-shrink: 0; }
  .top-actions { position: fixed; top: 16px; right: 16px; display: flex; gap: 8px; z-index: 100; }
  .icon-btn {
    background: var(--card-bg); color: var(--text);
    border: 1px solid var(--border);
    width: 40px; height: 40px;
    border-radius: 50%;
    cursor: pointer; font-size: 1.1rem;
    display: flex; align-items: center; justify-content: center;
    box-shadow: var(--shadow);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .icon-btn:hover { transform: translateY(-2px); box-shadow: var(--shadow-hover); }

  .options-bar {
    display: flex; justify-content: center; align-items: center;
    gap: 16px; flex-wrap: wrap;
    background: var(--card-bg);
    padding: 10px 18px; border-radius: 10px;
    box-shadow: var(--shadow);
    margin: 0 auto 10px; max-width: fit-content;
    flex-shrink: 0;
  }
  .toggle-wrap { display: flex; align-items: center; gap: 8px; cursor: pointer; user-select: none; font-size: 0.85rem; }
  .switch { position: relative; display: inline-block; width: 36px; height: 20px; flex-shrink: 0; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .slider { position: absolute; cursor: pointer; inset: 0; background: var(--switch-off); transition: 0.3s; border-radius: 20px; }
  .slider::before { content: ""; position: absolute; height: 14px; width: 14px; left: 3px; bottom: 3px; background: #fff; transition: 0.3s; border-radius: 50%; }
  .switch input:checked + .slider { background: var(--primary); }
  .switch input:checked + .slider::before { transform: translateX(16px); }
  .toggle-icon { font-size: 0.95rem; }
  .opt-input, .opt-select {
    font-size: 0.85em; padding: 4px 8px;
    border-radius: 6px; border: 1px solid var(--border-strong);
    background: var(--card-bg); color: var(--text);
    font-family: inherit; outline: none;
  }
  .opt-input { width: 100px; }
  .opt-select { cursor: pointer; }
  .opt-input:focus, .opt-select:focus { border-color: var(--primary); }

  .btn-row { text-align: center; margin-bottom: 10px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; flex-shrink: 0; }
  button.primary-btn, button.secondary-btn, button.warn-btn {
    color: #fff; border: none;
    padding: 9px 22px;
    font-size: 0.9rem; border-radius: 7px;
    cursor: pointer; font-weight: 600;
    transition: all 0.2s;
    box-shadow: var(--shadow);
  }
  .primary-btn { background: var(--primary); }
  .primary-btn:hover { background: var(--primary-hover); }
  .secondary-btn { background: var(--text-muted); }
  .secondary-btn:hover { opacity: 0.85; }
  .warn-btn { background: var(--success); }
  .warn-btn:hover { background: var(--success-hover); }
  button:active { transform: scale(0.97); }

  .status-row { text-align: center; margin-bottom: 8px; min-height: 22px; flex-shrink: 0; }
  .status { display: none; padding: 6px 14px; border-radius: 7px; font-size: 0.82rem; margin: 0 auto; max-width: fit-content; }
  .status.error { display: inline-block; background: var(--error-bg); color: var(--danger); border: 1px solid var(--danger); }
  .status.ok { display: inline-block; background: rgba(5,150,105,0.10); color: var(--success); border: 1px solid var(--success); }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    flex: 1 1 auto;
    min-height: 0;
  }
  .panel {
    display: flex; flex-direction: column;
    background: var(--card-bg);
    padding: 12px; border-radius: 10px;
    box-shadow: var(--shadow);
    min-width: 0; min-height: 0;
  }
  .panel-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; flex-wrap: wrap; gap: 8px; flex-shrink: 0; }
  .panel-title { font-weight: 700; font-size: 0.92rem; color: var(--primary); }
  .panel-title.label-2 { color: var(--danger); }

  .code-box {
    display: flex;
    border: 2px solid var(--border-strong);
    border-radius: 8px;
    overflow: hidden;
    flex: 1 1 auto;
    min-height: 0;
  }
  .code-box:focus-within { border-color: var(--primary); }
  .code-box.invalid { border-color: var(--danger); }

  .gutter {
    flex: 0 0 auto;
    min-width: 45px;
    padding: 12px 8px 12px 10px;
    background: var(--gutter-bg);
    color: var(--gutter-text);
    border-right: 1px solid var(--gutter-border);
    font-family: 'Consolas', monospace;
    font-size: 0.85rem; line-height: 1.5;
    text-align: right;
    user-select: none;
    pointer-events: none;
    white-space: pre;
    overflow: hidden;
  }
  .code-content {
    flex: 1 1 auto; min-width: 0; min-height: 0;
    display: flex; overflow: hidden;
  }
  textarea.code-input, .code-output {
    width: 100%; height: 100%;
    padding: 12px;
    border: none; background: transparent;
    color: var(--text);
    font-family: 'Consolas', monospace;
    font-size: 0.85rem; line-height: 1.5;
    resize: none; outline: none;
    overflow: auto;
    white-space: pre;
    display: block;
    flex: 1 1 auto;
    tab-size: 2;
  }
  .code-output[contenteditable="false"] { user-select: text; cursor: text; }

  .key      { color: var(--json-key); }
  .string   { color: var(--json-string); }
  .number   { color: var(--json-number); }
  .boolean  { color: var(--json-boolean); font-weight: 600; }
  .null     { color: var(--json-null); font-weight: 600; }

  .error-block {
    padding: 12px; color: var(--danger);
    background: var(--error-bg);
    border-left: 3px solid var(--danger);
    border-radius: 4px;
    font-family: 'Consolas', monospace;
    font-size: 0.85rem; white-space: pre-wrap;
    width: 100%;
  }

  .badge {
    background: var(--primary); color: #fff;
    border-radius: 20px;
    padding: 2px 9px; font-size: 0.72rem; font-weight: 600;
    flex-shrink: 0;
  }
  .copy-btn { background: var(--success); color: #fff; border: none; padding: 4px 12px; font-size: 0.78rem; border-radius: 6px; cursor: pointer; font-weight: 600; flex-shrink: 0; }
  .copy-btn:hover { background: var(--success-hover); }

  @media (max-width: 1000px) { .grid { grid-template-columns: 1fr; } body, html { height: auto; min-height: 100vh; } }
  @media (max-width: 700px) { h1 { font-size: 1.3rem; } }
</style>
</head>
<body>

<div class="top-actions">
  <button class="icon-btn" id="theme-toggle" title="Toggle dark mode">🌙</button>
</div>

<div class="container">
  <h1>XML → JSON Converter</h1>
  <p class="subtitle">
    Convert XML to clean JSON. Configure attribute prefix, text key, array detection, and value coercion.<br>
    <span style="color:var(--hint);font-size:0.85em;">All processing is local. Nothing is uploaded.</span>
  </p>

  <div class="options-bar">
    <label class="toggle-wrap" title="Prefix for XML attributes in JSON output">
      <span class="toggle-icon">@</span>
      <span>Attr prefix:</span>
      <input type="text" id="opt-attr-prefix" class="opt-input" value="@" maxlength="5">
    </label>
    <label class="toggle-wrap" title="Key name to use for element text content">
      <span class="toggle-icon">#</span>
      <span>Text key:</span>
      <input type="text" id="opt-text-key" class="opt-input" value="#text" maxlength="20">
    </label>
    <label class="toggle-wrap" title="Indent size">
      <span class="toggle-icon">📏</span>
      <span>Indent</span>
      <select id="opt-indent" class="opt-select">
        <option value="2">2 spaces</option>
        <option value="4">4 spaces</option>
        <option value="0">Minified</option>
      </select>
    </label>
    <label class="toggle-wrap" title="Convert numeric strings to numbers (e.g., '42' → 42)">
      <span class="toggle-icon">🔢</span>
      <span>Coerce numbers</span>
      <span class="switch"><input type="checkbox" id="opt-num" checked><span class="slider"></span></span>
    </label>
    <label class="toggle-wrap" title="Convert 'true'/'false' to booleans">
      <span class="toggle-icon">✓</span>
      <span>Coerce booleans</span>
      <span class="switch"><input type="checkbox" id="opt-bool" checked><span class="slider"></span></span>
    </label>
    <label class="toggle-wrap" title="Always wrap repeated child elements in an array (even if only one occurrence)">
      <span class="toggle-icon">📋</span>
      <span>Force arrays</span>
      <span class="switch"><input type="checkbox" id="opt-force-array"><span class="slider"></span></span>
    </label>
    <label class="toggle-wrap" title="Trim whitespace from text content">
      <span class="toggle-icon">␣</span>
      <span>Trim text</span>
      <span class="switch"><input type="checkbox" id="opt-trim" checked><span class="slider"></span></span>
    </label>
    <label class="toggle-wrap" title="Skip XML comments and processing instructions">
      <span class="toggle-icon">🚫</span>
      <span>Skip comments</span>
      <span class="switch"><input type="checkbox" id="opt-skip-comments" checked><span class="slider"></span></span>
    </label>
    <label class="toggle-wrap" title="Apply syntax highlighting">
      <span class="toggle-icon">🎨</span>
      <span>Syntax highlight</span>
      <span class="switch"><input type="checkbox" id="opt-highlight" checked><span class="slider"></span></span>
    </label>
  </div>

  <div class="btn-row">
    <button class="primary-btn" id="btnConvert">🔄 Convert to JSON</button>
    <button class="warn-btn" id="btnCopy">📋 Copy</button>
    <button class="primary-btn" id="btnDownload">⬇️ Download</button>
    <button class="secondary-btn" id="btnSample">📄 Sample</button>
    <button class="secondary-btn" id="btnClear">🗑️ Clear</button>
  </div>

  <div class="status-row"><div id="status" class="status"></div></div>

  <div class="grid">
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">📥 Input XML</span>
        <span class="badge" id="input-count">0 lines</span>
      </div>
      <div class="code-box" id="inputWrap">
        <div class="gutter" id="inputLines">1</div>
        <div class="code-content">
          <textarea id="input" class="code-input" placeholder="Paste your XML here..." spellcheck="false"></textarea>
        </div>
      </div>
    </div>
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title label-2">📤 Output JSON</span>
        <div style="display:flex;gap:6px;align-items:center;">
          <span class="badge" id="output-count">0 lines</span>
          <button class="copy-btn" id="btnCopy2">📋 Copy</button>
        </div>
      </div>
      <div class="code-box">
        <div class="gutter" id="outputLines">&nbsp;</div>
        <div class="code-content">
          <div id="output" class="code-output" contenteditable="false"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  const b = document.getElementById('theme-toggle');
  if (b) b.textContent = t === 'dark' ? '☀️' : '🌙';
}
function toggleTheme() {
  const c = document.documentElement.getAttribute('data-theme') || 'light';
  const n = c === 'light' ? 'dark' : 'light';
  applyTheme(n);
  try { localStorage.setItem('xml2json-theme', n); } catch(e){}
}
(function(){ let s='light'; try{s=localStorage.getItem('xml2json-theme')||'light';}catch(e){} document.documentElement.setAttribute('data-theme', s); })();

document.addEventListener('DOMContentLoaded', function() {
  let saved = 'light';
  try { saved = localStorage.getItem('xml2json-theme') || 'light'; } catch(e){}
  applyTheme(saved);
  document.getElementById('theme-toggle').addEventListener('click', toggleTheme);

  const inputEl = document.getElementById('input');
  const outputEl = document.getElementById('output');
  const inputLines = document.getElementById('inputLines');
  const outputLines = document.getElementById('outputLines');
  const inputCount = document.getElementById('input-count');
  const outputCount = document.getElementById('output-count');
  const inputWrap = document.getElementById('inputWrap');
  const statusEl = document.getElementById('status');

  function showStatus(msg, ok) {
    statusEl.textContent = msg;
    statusEl.className = 'status ' + (ok ? 'ok' : 'error');
    if (ok) setTimeout(() => { statusEl.style.display='none'; statusEl.className='status'; }, 4000);
  }
  function escapeHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  function updateLineNumbers(el, text) {
    const lines = (text || '').split('\n').length || 1;
    let h = '';
    for (let i = 1; i <= lines; i++) h += i + '\n';
    el.textContent = h.replace(/\n$/, '');
  }
  function updateInputCount() {
    const t = inputEl.value;
    const n = t.length === 0 ? 0 : t.split('\n').length;
    inputCount.textContent = n + (n === 1 ? ' line' : ' lines');
  }
  function syncScroll(src, gut) { gut.scrollTop = src.scrollTop; }

  function getOpts() {
    return {
      attrPrefix: document.getElementById('opt-attr-prefix').value || '@',
      textKey: document.getElementById('opt-text-key').value || '#text',
      indent: parseInt(document.getElementById('opt-indent').value, 10),
      coerceNum: document.getElementById('opt-num').checked,
      coerceBool: document.getElementById('opt-bool').checked,
      forceArray: document.getElementById('opt-force-array').checked,
      trim: document.getElementById('opt-trim').checked,
      skipComments: document.getElementById('opt-skip-comments').checked,
      highlight: document.getElementById('opt-highlight').checked
    };
  }

  /* ---------- XML → JS Object ---------- */
  function coerce(s, opts) {
    if (typeof s !== 'string') return s;
    if (opts.coerceBool) {
      if (s === 'true') return true;
      if (s === 'false') return false;
    }
    if (opts.coerceNum && s !== '' && !isNaN(s) && !/^0\d/.test(s) && /^-?\d+(\.\d+)?([eE][+\-]?\d+)?$/.test(s)) {
      return Number(s);
    }
    return s;
  }

  function elementToJson(el, opts) {
    const obj = {};
    let hasChildren = false;
    let textOnly = '';

    // Attributes
    if (el.attributes && el.attributes.length > 0) {
      for (let i = 0; i < el.attributes.length; i++) {
        const attr = el.attributes[i];
        obj[opts.attrPrefix + attr.name] = coerce(attr.value, opts);
      }
    }

    // Children
    const children = el.childNodes;
    for (let i = 0; i < children.length; i++) {
      const node = children[i];
      if (node.nodeType === 1) { // Element
        hasChildren = true;
        const childObj = elementToJson(node, opts);
        const name = node.nodeName;
        const value = childObj;
        if (obj.hasOwnProperty(name)) {
          if (!Array.isArray(obj[name])) obj[name] = [obj[name]];
          obj[name].push(value);
        } else {
          obj[name] = value;
        }
      } else if (node.nodeType === 3) { // Text
        let txt = node.nodeValue;
        if (opts.trim) txt = txt.trim();
        if (txt) textOnly += txt;
      } else if (node.nodeType === 4) { // CDATA
        textOnly += node.nodeValue;
      } else if (node.nodeType === 8) { // Comment
        if (!opts.skipComments) {
          if (!obj['#comments']) obj['#comments'] = [];
          obj['#comments'].push(node.nodeValue);
        }
      }
    }

    // Force-array option
    if (opts.forceArray) {
      Object.keys(obj).forEach(k => {
        if (k.startsWith(opts.attrPrefix)) return; // skip attributes
        if (k === opts.textKey) return;
        if (!Array.isArray(obj[k])) obj[k] = [obj[k]];
      });
    }

    // Decide return shape
    const hasAttrs = Object.keys(obj).some(k => k.startsWith(opts.attrPrefix));
    const hasOtherChildren = Object.keys(obj).some(k => !k.startsWith(opts.attrPrefix));

    if (!hasChildren && textOnly !== '') {
      // Pure text node
      const coerced = coerce(textOnly, opts);
      if (hasAttrs) {
        obj[opts.textKey] = coerced;
        return obj;
      }
      return coerced;
    }
    if (hasChildren && textOnly !== '' && !hasOtherChildren) {
      obj[opts.textKey] = coerce(textOnly, opts);
    } else if (hasChildren && textOnly !== '') {
      obj[opts.textKey] = coerce(textOnly, opts);
    }

    if (Object.keys(obj).length === 0) return '';
    return obj;
  }

  function xmlToJson(xmlStr, opts) {
    const parser = new DOMParser();
    const doc = parser.parseFromString(xmlStr, 'application/xml');
    const errNode = doc.getElementsByTagName('parsererror')[0];
    if (errNode) throw new Error('Invalid XML: ' + errNode.textContent);
    const root = doc.documentElement;
    if (!root) throw new Error('No root element found');
    const rootObj = {};
    rootObj[root.nodeName] = elementToJson(root, opts);
    return rootObj;
  }

  /* ---------- JSON Syntax Highlighter ---------- */
  function syntaxHighlight(json) {
    json = escapeHtml(json);
    const BS = String.fromCharCode(92);
    const stringPart = '"(?:' + BS + BS + '.|[^"' + BS + BS + '])*"(?:\\s*:)?';
    const keywordPart = '\\b(?:true|false|null)\\b';
    const numberPart = '-?\\d+(?:\\.\\d+)?(?:[eE][+\\-]?\\d+)?';
    const pat = new RegExp(stringPart + '|' + keywordPart + '|' + numberPart, 'g');
    return json.replace(pat, function(m) {
      let cls = 'number';
      if (/^"/.test(m)) cls = /:\s*$/.test(m) ? 'key' : 'string';
      else if (/^(true|false)$/.test(m)) cls = 'boolean';
      else if (/^null$/.test(m)) cls = 'null';
      return '<span class="' + cls + '">' + m + '</span>';
    });
  }

  /* ---------- Actions ---------- */
  function convert() {
    const raw = inputEl.value.trim();
    if (!raw) { showStatus('❌ Input is empty.', false); return; }
    try {
      const opts = getOpts();
      const obj = xmlToJson(raw, opts);
      const indent = opts.indent === 0 ? 0 : opts.indent;
      const json = JSON.stringify(obj, null, indent);
      window._jsonOutput = json;
      if (opts.highlight) outputEl.innerHTML = syntaxHighlight(json);
      else outputEl.textContent = json;
      updateLineNumbers(outputLines, json);
      const lc = json.split('\n').length;
      outputCount.textContent = lc + (lc === 1 ? ' line' : ' lines');
      inputWrap.classList.remove('invalid');
      showStatus('✅ Converted! ' + lc + ' lines, ' + json.length + ' chars.', true);
    } catch (e) {
      inputWrap.classList.add('invalid');
      outputEl.innerHTML = '<div class="error-block">❌ ' + escapeHtml(e.message) + '</div>';
      updateLineNumbers(outputLines, '');
      outputCount.textContent = '0 lines';
      showStatus('❌ ' + e.message, false);
    }
  }

  function copyOutput(btn) {
    const text = window._jsonOutput || '';
    if (!text) { showStatus('Nothing to copy.', false); return; }
    const done = () => showStatus('📋 Copied!', true);
    if (navigator.clipboard?.writeText) navigator.clipboard.writeText(text).then(done).catch(fb);
    else fb();
    function fb() {
      const t = document.createElement('textarea');
      t.value = text; t.style.position='fixed'; t.style.opacity='0';
      document.body.appendChild(t); t.select();
      try { document.execCommand('copy'); done(); } catch(e){}
      document.body.removeChild(t);
    }
  }

  function download() {
    const text = window._jsonOutput || '';
    if (!text) { showStatus('Nothing to download.', false); return; }
    const blob = new Blob([text], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'converted.json';
    document.body.appendChild(a); a.click();
    setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
  }

  function loadSample() {
    inputEl.value =
`<?xml version="1.0" encoding="UTF-8"?>
<company id="C001" version="1.0">
  <name>Acme Corp</name>
  <founded>1995</founded>
  <active>true</active>
  <employees>
    <employee id="E1">
      <name>Alice</name>
      <role>Engineer</role>
      <salary>75000</salary>
    </employee>
    <employee id="E2">
      <name>Bob</name>
      <role>Manager</role>
      <salary>95000</salary>
    </employee>
  </employees>
  <address type="HQ">
    <street>123 Main St</street>
    <city>Springfield</city>
    <notes><![CDATA[Some <special> notes & details]]></notes>
  </address>
  <description>A great company.</description>
</company>`;
    onInput();
    convert();
  }

  function clearAll() {
    inputEl.value = '';
    outputEl.innerHTML = '';
    window._jsonOutput = '';
    onInput();
    updateLineNumbers(outputLines, '');
    outputCount.textContent = '0 lines';
    statusEl.style.display = 'none';
    inputWrap.classList.remove('invalid');
  }

  function onInput() {
    updateLineNumbers(inputLines, inputEl.value);
    updateInputCount();
  }

  document.getElementById('btnConvert').addEventListener('click', convert);
  document.getElementById('btnCopy').addEventListener('click', e => copyOutput(e.target));
  document.getElementById('btnCopy2').addEventListener('click', e => copyOutput(e.target));
  document.getElementById('btnDownload').addEventListener('click', download);
  document.getElementById('btnSample').addEventListener('click', loadSample);
  document.getElementById('btnClear').addEventListener('click', clearAll);

  inputEl.addEventListener('input', onInput);
  inputEl.addEventListener('scroll', () => syncScroll(inputEl, inputLines));
  outputEl.addEventListener('scroll', () => syncScroll(outputEl, outputLines));

  outputEl.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'a') {
      e.preventDefault();
      const r = document.createRange(); r.selectNodeContents(outputEl);
      const s = window.getSelection(); s.removeAllRanges(); s.addRange(r);
    }
  });

  onInput();
  updateLineNumbers(outputLines, '');
});
</script>
</body>
</html>
